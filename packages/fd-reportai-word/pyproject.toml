[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "fd-reportai-word"
version = "0.1.0"
description = "Pipeline skeleton for fd-reportai-word."
requires-python = ">=3.10"
dependencies = [
    "openpyxl>=3.1",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
fd_reportai_word = ["templates/**/*.md", "prompts/**/*.txt", "examples/**/*.py", "examples/**/*.json", "rules/**/*.xlsx"]
